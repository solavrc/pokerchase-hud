<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>PokerChase HUD — promo small 440x280</title>
<style>
  :root {
    --purple-950: #0a0612;
    --purple-900: #150c24;
    --purple-800: #241a3d;
    --violet-glow: #8b3ff0;
    --magenta-glow: #c026d3;
    --felt-green: #123a24;
    --gold: #f0b429;
    --gold-soft: #f6cd6e;
    --text-white: #f6f4ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 440px;
    height: 280px;
    overflow: hidden;
    background: #0a0612;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .stage {
    position: relative;
    width: 440px;
    height: 280px;
    background:
      radial-gradient(ellipse 340px 220px at 88% -8%, rgba(192, 38, 211, 0.38), transparent 60%),
      radial-gradient(ellipse 320px 200px at -10% 112%, rgba(18, 58, 36, 0.65), transparent 58%),
      radial-gradient(ellipse 260px 180px at 50% 40%, rgba(139, 63, 240, 0.22), transparent 65%),
      linear-gradient(160deg, var(--purple-800) 0%, var(--purple-950) 62%, #050308 100%);
  }
  .stage::before {
    /* faint neon border frame, echoes the game's glow-edged panels */
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 14px;
    border: 1px solid rgba(240, 180, 41, 0.16);
    pointer-events: none;
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .badge {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    background: linear-gradient(160deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02));
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 63, 240, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .badge img {
    width: 76px;
    height: 76px;
    border-radius: 16px;
    display: block;
  }
  .name {
    margin: 0;
    font-size: 33px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text-white);
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.55);
    white-space: nowrap;
  }
  .name .accent { color: var(--gold-soft); }
  .tagline {
    padding: 6px 20px;
    border-radius: 999px;
    background: rgba(240, 180, 41, 0.12);
    border: 1px solid rgba(240, 180, 41, 0.5);
    color: var(--gold-soft);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="content">
      <div class="badge"><img src="../../../icons/icon_128px.png" alt=""></div>
      <h1 class="name">Poker<span class="accent">Chase</span> HUD</h1>
      <div class="tagline">リアルタイム統計HUD</div>
    </div>
  </div>
</body>
</html>
