<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>PokerChase HUD — promo marquee 1400x560</title>
<style>
  :root {
    --purple-950: #0a0612;
    --purple-900: #150c24;
    --purple-800: #241a3d;
    --violet-glow: #8b3ff0;
    --magenta-glow: #c026d3;
    --felt-green: #123a24;
    --gold: #f0b429;
    --gold-soft: #f6cd6e;
    --text-white: #f6f4ff;
    --text-dim: rgba(246, 244, 255, 0.72);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 1400px;
    height: 560px;
    overflow: hidden;
    background: #0a0612;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .stage {
    position: relative;
    width: 1400px;
    height: 560px;
    display: flex;
  }
  .brand {
    position: relative;
    width: 460px;
    height: 560px;
    flex: 0 0 460px;
    background:
      radial-gradient(ellipse 420px 320px at -15% 118%, rgba(18, 58, 36, 0.65), transparent 58%),
      radial-gradient(ellipse 360px 280px at 105% -12%, rgba(192, 38, 211, 0.32), transparent 60%),
      radial-gradient(ellipse 320px 260px at 50% 45%, rgba(139, 63, 240, 0.24), transparent 65%),
      linear-gradient(165deg, var(--purple-800) 0%, var(--purple-950) 62%, #050308 100%);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 0 56px;
    z-index: 2;
  }
  .badge {
    width: 118px;
    height: 118px;
    border-radius: 28px;
    background: linear-gradient(160deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02));
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 16px 34px rgba(0, 0, 0, 0.5), 0 0 46px rgba(139, 63, 240, 0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 26px;
  }
  .badge img {
    width: 94px;
    height: 94px;
    border-radius: 20px;
    display: block;
  }
  .name {
    margin: 0;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-white);
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
    white-space: nowrap;
    line-height: 1.15;
  }
  .name .accent { color: var(--gold-soft); }
  .tagline {
    margin-top: 18px;
    padding: 8px 22px;
    border-radius: 999px;
    background: rgba(240, 180, 41, 0.12);
    border: 1px solid rgba(240, 180, 41, 0.5);
    color: var(--gold-soft);
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
  .subcopy {
    margin: 20px 0 0;
    max-width: 340px;
    font-size: 17px;
    line-height: 1.65;
    color: var(--text-dim);
    font-weight: 500;
  }
  .shot-wrap {
    position: relative;
    width: 940px;
    height: 560px;
    flex: 0 0 940px;
    overflow: hidden;
    background: var(--purple-950);
  }
  .shot-wrap img {
    position: absolute;
    top: 0;
    left: 0;
    width: 940px;
    height: 560px;
    object-fit: cover;
    object-position: center 22%;
    display: block;
  }
  .seam-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--purple-950) 0%, rgba(10, 6, 18, 0.55) 7%, rgba(10, 6, 18, 0) 15%);
    pointer-events: none;
  }
  .frame-glow {
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.45);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand">
      <div class="badge"><img src="../../../icons/icon_128px.png" alt=""></div>
      <h1 class="name">Poker<span class="accent">Chase</span><br>HUD</h1>
      <div class="tagline">リアルタイム統計HUD</div>
      <p class="subcopy">プレイ中の13種類以上の統計とハンド履歴を、テーブル上にリアルタイム表示。</p>
    </div>
    <div class="shot-wrap">
      <img src="../store-5-handlog.png" alt="">
      <div class="seam-fade"></div>
      <div class="frame-glow"></div>
    </div>
  </div>
</body>
</html>
