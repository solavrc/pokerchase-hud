name: Release Please

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr_number: ${{ steps.release.outputs.pr.number }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Build signed CRX
        env:
          CWS_CRX_PRIVATE_KEY: ${{ secrets.CWS_CRX_PRIVATE_KEY }}
        run: |
          if [[ -z "$CWS_CRX_PRIVATE_KEY" ]]; then
            echo "CWS_CRX_PRIVATE_KEY is not configured" >&2
            exit 1
          fi

          key_file=$(mktemp)
          trap 'rm -f "$key_file"' EXIT
          chmod 600 "$key_file"
          printf '%s' "$CWS_CRX_PRIVATE_KEY" > "$key_file"
          xvfb-run -a npm run pack:crx -- "$key_file"

      - name: Upload Release Asset
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} extension.zip extension.crx --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
